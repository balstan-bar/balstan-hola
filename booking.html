<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حجز الغرف | بلستان</title>
<meta name="description" content="احجز غرفتك الخاصة في بلستان بسهولة، واختر رقم الغرفة ووقت الحجز المناسب لك.">
  <link rel="stylesheet" href="booking.css" />
  
</head>
<body>
  <div class="booking-page">
    <div class="booking-card">
      <h1>نموذج حجز الغرف</h1>
      <p class="subtitle">يرجى تعبئة البيانات التالية لإتمام طلب الحجز</p>

      <form id="bookingForm" class="booking-form">
        <div class="form-group">
          <label for="roomNumber">رقم الغرفة</label>
          <select id="roomNumber" name="roomNumber" required>
  <option value="">اختر رقم الغرفة</option>
  <option value="1">غرفة 1</option>
  <option value="2">غرفة 2</option>
  <option value="3">غرفة 3</option>
  <option value="4">غرفة 4</option>
</select>
        </div>

        <div class="form-group">
          <label for="fullName">الاسم الكامل</label>
          <input type="text" id="fullName" name="fullName" placeholder="اكتب اسمك الكامل" required />
        </div>
         <div class="note-box full-width">
          <strong>ملاحظة:</strong>
         الغرف الخاصة مخصصة للمجموعات التي عددها 4 أشخاص أو اكثر.
        </div>
        <div class="form-group">
          <label for="peopleCount">عدد الأشخاص</label>
          <input type="number" id="peopleCount" name="peopleCount" min="1" placeholder="مثلاً 4" required />
        </div>

        <div class="form-group">
          <label for="day">اليوم</label>
          <select id="day" name="day" required>
            <option value="">اختر اليوم</option>
            <option value="الأحد">الأحد</option>
            <option value="الاثنين">الاثنين</option>
            <option value="الثلاثاء">الثلاثاء</option>
            <option value="الأربعاء">الأربعاء</option>
            <option value="الخميس">الخميس</option>
            <option value="الجمعة">الجمعة</option>
            <option value="السبت">السبت</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">التاريخ</label>
          <input type="date" id="date" name="date" required />
        </div>

        <div class="form-group">
          <label for="startTime">وقت  الحجز</label>
          <input type="time" id="startTime" name="startTime" required />
        </div>

        <div class="form-group full-width">
          <label for="notes">ملاحظات إضافية</label>
          <textarea id="notes" name="notes" rows="4" placeholder="أي ملاحظة إضافية..."></textarea>
        </div>

        <button type="submit" class="submit-btn">إرسال طلب الحجز عبر واتساب</button>
      </form>
    </div>
  </div>

  <script src="booking.js"></script>
</body>
</html>
